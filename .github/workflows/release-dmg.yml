name: Release DMG

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: true
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release target
        id: release_target
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            VERSION="$(node -e "const pkg=require('./package.json'); const stable=(pkg.version || '0.1.0').split('-')[0]; const [major, minor, patch] = stable.split('.').map(Number); console.log([major, minor, patch + 1].join('.') + '-beta.' + process.env.GITHUB_RUN_NUMBER)")"
            echo "tag=main-snapshot" >> "$GITHUB_OUTPUT"
            echo "title=Main Snapshot ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "This workflow only publishes from main or version tags. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Set build version
        env:
          BUILD_VERSION: ${{ steps.release_target.outputs.version }}
        run: |
          set -euo pipefail
          node -e "const fs=require('fs'); const path='package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=process.env.BUILD_VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Build DMG
        run: npm run dist:mac

      - name: Verify updater artifacts
        run: |
          set -euo pipefail
          ls -lh release
          test -f release/latest-mac.yml
          ls release/*.zip >/dev/null
          ls release/*.dmg >/dev/null

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: codeye-release-${{ github.ref_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/*.blockmap
          if-no-files-found: error

      - name: Move rolling prerelease tag
        if: github.ref == 'refs/heads/main'
        env:
          RELEASE_TAG: ${{ steps.release_target.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_target.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_target.outputs.title }}
          RELEASE_VERSION: ${{ steps.release_target.outputs.version }}
          RELEASE_PRERELEASE: ${{ steps.release_target.outputs.prerelease }}
        run: |
          set -euo pipefail
          FILES=(release/*.dmg release/*.zip release/latest-mac.yml release/*.blockmap)
          NOTES="Automated build ${RELEASE_VERSION} from ${GITHUB_REF_NAME} (${GITHUB_SHA})"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${FILES[@]}" --clobber
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "$NOTES" --prerelease
            else
              gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "$NOTES" --latest
            fi
          else
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              gh release create "$RELEASE_TAG" "${FILES[@]}" --title "$RELEASE_TITLE" --notes "$NOTES" --prerelease
            else
              gh release create "$RELEASE_TAG" "${FILES[@]}" --title "$RELEASE_TITLE" --notes "$NOTES" --latest
            fi
          fi
