name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0). Leave empty to use package.json version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(node -p 'require("./package.json").version')"
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "📦 Building version ${VERSION} (tag: ${TAG})"

      - name: Set build version
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.BUILD_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build DMG
        run: npm run dist:mac

      - name: Verify artifacts
        run: |
          set -euo pipefail
          ls -lh release/*.dmg release/*.zip
          echo "✅ Artifacts ready"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codeye-${{ steps.version.outputs.version }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/*.blockmap
          if-no-files-found: error

      - name: Create tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          FILES=(release/*.dmg release/*.zip)

          # Add updater files if they exist
          [ -f release/latest-mac.yml ] && FILES+=(release/latest-mac.yml)
          for f in release/*.blockmap; do [ -f "$f" ] && FILES+=("$f"); done

          NOTES="## Codeye v${VERSION}

          Automated build from \`${GITHUB_SHA::8}\`

          ### Install
          Download the \`.dmg\` file below and drag Codeye to Applications."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" "${FILES[@]}" \
              --title "v${VERSION}" \
              --notes "$NOTES" \
              --latest
          fi
